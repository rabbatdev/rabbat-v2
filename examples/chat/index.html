<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Omit the Referer on all subresource loads. External media CDNs we
         hotlink (twimg images AND videos, Google avatars) hotlink-protect by
         Referer — video.twimg.com 403s a localhost referer, so a video embed
         won't play unless the request carries no referer. -->
    <meta name="referrer" content="no-referrer" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Installable PWA + edge-to-edge on iOS: draw under the status bar (the
         app frame colour fills the safe areas via env(safe-area-inset-*)). -->
    <meta name="theme-color" content="#0e0f12" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="en" />
    <!-- Page title + Open Graph / Twitter tags are injected here per route by the
         framework from rabbat.config.ts `meta` and each page's `meta` export. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!--rabbat-head-->
  </head>
  <body>
    <div id="root"><!--rabbat-app--></div>
    <script type="module" src="/src/entry.tsx"></script>
  </body>
</html>
