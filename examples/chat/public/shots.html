<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>en — mobile screenshots</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #0d0d10;
        color: #f2f2f5;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        padding: 20px 16px 48px;
      }
      h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 4px; }
      p.sub { color: #8a8a93; font-size: 13.5px; margin: 0 0 24px; }
      .grid { display: grid; gap: 28px; max-width: 460px; margin: 0 auto; }
      figure { margin: 0; }
      figcaption { font-size: 13px; font-weight: 600; color: #c9c9d1; margin-bottom: 8px; }
      figcaption span { color: #7c7c85; font-weight: 400; }
      img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.09);
        box-shadow: 0 12px 30px -12px rgba(0, 0, 0, 0.65);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <header>
        <h1>en — mobile UI</h1>
        <p class="sub">Captured at 390×844 (iPhone-class). Tap an image to zoom.</p>
      </header>
      <figure>
        <figcaption>1. Chat <span>— hamburger · title · members icon, full-width messages</span></figcaption>
        <a href="shots/1-chat.png"><img src="shots/1-chat.png" alt="Mobile chat view" /></a>
      </figure>
      <figure>
        <figcaption>2. Channels drawer <span>— slides in beside the orbit rail</span></figcaption>
        <a href="shots/2-channels-drawer.png"><img src="shots/2-channels-drawer.png" alt="Channels drawer" /></a>
      </figure>
      <figure>
        <figcaption>3. Members drawer <span>— slides in from the right</span></figcaption>
        <a href="shots/3-members-drawer.png"><img src="shots/3-members-drawer.png" alt="Members drawer" /></a>
      </figure>
      <figure>
        <figcaption>4. Profile modal <span>— fits the screen, no overflow</span></figcaption>
        <a href="shots/4-profile.png"><img src="shots/4-profile.png" alt="Profile modal" /></a>
      </figure>
      <figure>
        <figcaption>5. Orbit settings <span>— sidebar nav + invites, capped height</span></figcaption>
        <a href="shots/5-settings.png"><img src="shots/5-settings.png" alt="Orbit settings modal" /></a>
      </figure>
    </div>
  </body>
</html>
